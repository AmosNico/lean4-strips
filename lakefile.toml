name = "strips"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Strips"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "Parser"
# the version v4.29.1 was skiped, use fork
# git = "https://github.com/fgdorais/lean4-parser"
git = "https://gitlab.kuleuven.be/u0185131/lean4-parser.git"
rev = "v4.29.1"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.1"

[[lean_lib]]
name = "Strips"

[[lean_exe]]
name = "test-parser"
root = "Test"